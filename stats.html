<!-- File: stats.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Insights | Joe Sheldon</title>
    
    <!-- Core Styles and Web Components -->
    <link class="main-stylesheet" rel="stylesheet" href="/style.css">
    <script src="/components.js"></script>

    <style>
        .stats-hub-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 1rem 5rem 1rem;
        }

        .events-header {
            text-align: center;
            margin-bottom: 3rem;
        }
        
        .events-header h1 {
            margin-top: 3rem;
            font-size: 2.8rem;
            font-weight: 900;
            color: var(--card-accent-color, #333);
        }

        .intro {
            font-size: 1.15rem;
            color: #555;
            max-width: 600px;
            margin: 1rem auto 0;
        }

        /* North Sound Pill Buttons */
        .section-title {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--premier-charcoal, #333);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pill-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 4rem;
        }

        .pill-btn {
            display: inline-flex;
            align-items: center;
            padding: 0.6rem 1.5rem;
            background: #ffffff;
            border: 2px solid var(--light-gray, #eaeaea);
            border-radius: 50px;
            color: var(--premier-charcoal, #333);
            font-weight: 700;
            font-size: 1rem;
            text-decoration: none;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .pill-btn:hover {
            border-color: var(--card-accent-color, #C13030);
            background: var(--card-accent-color, #C13030);
            color: #ffffff;
            transform: translateY(-2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* Dropdown Layout */
        .county-dropdowns-wrapper {
            display: grid;
            grid-template-columns: 1fr;
            gap: 2rem;
            background: var(--dynamic-bg-highlight, #fdfdfd);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid var(--light-gray, #eaeaea);
        }

        @media (min-width: 768px) {
            .county-dropdowns-wrapper {
                grid-template-columns: 1fr 1fr;
            }
        }

        .dropdown-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .dropdown-group label {
            font-weight: 800;
            font-size: 1.1rem;
            color: var(--premier-charcoal, #333);
        }

        .modern-select {
            padding: 1rem;
            font-size: 1rem;
            font-weight: 600;
            color: var(--premier-charcoal, #333);
            background-color: #ffffff;
            border: 2px solid var(--light-gray, #eaeaea);
            border-radius: 8px;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s ease;
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg fill="%23333" height="24" viewBox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg"><path d="M7 10l5 5 5-5z"/><path d="M0 0h24v24H0z" fill="none"/></svg>');
            background-repeat: no-repeat;
            background-position-x: 96%;
            background-position-y: 50%;
        }

        .modern-select:hover, .modern-select:focus {
            border-color: var(--card-accent-color, #C13030);
        }

        .loading-text {
            text-align: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: #555;
            margin: 3rem 0;
        }
    </style>
</head>
<body class="stats-page">

    <!-- Your Custom Web Component Header -->
    <universal-header></universal-header>

    <main class="stats-hub-container">
        
        <!-- Page Header -->
        <div class="events-header">
            <h1>Local Community Insights</h1>
            <p class="intro">Real-time data, historical housing trends, and neighborhood metrics for the Pacific Northwest.</p>
        </div>

        <div id="loading-indicator" class="loading-text">Loading community directory...</div>

        <!-- Directory Content (Hidden until JS loads data) -->
        <div id="directory-content" style="display: none;">
            
            <!-- Featured North Sound Section -->
            <h2 class="section-title">North Sound</h2>
            <div id="north-sound-pills" class="pill-container">
                <!-- Pill buttons injected here -->
            </div>

            <!-- County Dropdown Section -->
            <h2 class="section-title" style="margin-top: 4rem;">Explore By County</h2>
            <div class="county-dropdowns-wrapper">
                
                <div class="dropdown-group">
                    <label for="king-county-select">King County</label>
                    <select id="king-county-select" class="modern-select">
                        <option value="">Select a community...</option>
                        <!-- Options injected here -->
                    </select>
                </div>

                <div class="dropdown-group">
                    <label for="snohomish-county-select">Snohomish County</label>
                    <select id="snohomish-county-select" class="modern-select">
                        <option value="">Select a community...</option>
                        <!-- Options injected here -->
                    </select>
                </div>

            </div>
        </div>

    </main>

    <!-- Your Custom Web Component Footer -->
    <universal-footer></universal-footer>

    <!-- Script to dynamically generate the UI from your JSON -->
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
        const loadingIndicator = document.getElementById('loading-indicator');
        const directoryContent = document.getElementById('directory-content');
        const pillContainer = document.getElementById('north-sound-pills');
        const kingSelect = document.getElementById('king-county-select');
        const snohomishSelect = document.getElementById('snohomish-county-select');
        
        try {
            const response = await fetch('/data/city_data.json');
            if (!response.ok) throw new Error("Data fetch failed");
            
            const rawData = await response.json();
            
            // Deduplicate the cities (Handling the "Bothell Anomaly")
            const uniqueCities = [];
            const seenCities = new Set();
            
            for (const item of rawData) {
                if (item.City && !seenCities.has(item.City)) {
                    seenCities.add(item.City);
                    uniqueCities.push(item);
                }
            }
            
            uniqueCities.sort((a, b) => a.City.localeCompare(b.City));
            
            uniqueCities.forEach(city => {
                const slug = city.City.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');
                const url = `/communities/${slug}/stats/`;
                
                if (city['North Sound'] && city['North Sound'].toLowerCase() === 'x') {
                    const pill = document.createElement('a');
                    pill.href = url;
                    pill.className = 'pill-btn';
                    pill.textContent = city.City;
                    pill.setAttribute('rel', 'prefetch'); 
                    pillContainer.appendChild(pill);
                }

                const option = document.createElement('option');
                option.value = url;
                option.textContent = city.City;

                if (city.County && city.County.toLowerCase().includes('king')) {
                    kingSelect.appendChild(option.cloneNode(true));
                }
                
                if (city.County && city.County.toLowerCase().includes('snohomish')) {
                    snohomishSelect.appendChild(option.cloneNode(true));
                }
            });

            const navigateToCity = (e) => {
                const url = e.target.value;
                if (url) window.location.href = url;
            };

            kingSelect.addEventListener('change', navigateToCity);
            snohomishSelect.addEventListener('change', navigateToCity);

            loadingIndicator.style.display = 'none';
            directoryContent.style.display = 'block';
            
        } catch (error) {
            console.error("Error loading city directory:", error);
            loadingIndicator.innerHTML = '<span style="color: var(--card-accent-color, #d32f2f);">Unable to load community directory at this time. Please refresh.</span>';
        }
    });
    </script>
</body>
</html>
