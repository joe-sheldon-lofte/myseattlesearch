<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Market Insights | Joe Sheldon</title>
    <link rel="stylesheet" href="style.css?v=40">
    
    <script src="components.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="pro-page">

    <universal-header></universal-header>

    <main class="container" style="max-width: 1000px; padding-bottom: 5rem;">
        
        <div class="events-header">
            <h1 style="margin-top: 1rem;">Local Market Insights</h1>
            <p class="intro">Live, data-driven updates on pricing, velocity, and inventory for your specific neighborhood.</p>
        </div>

        <div class="filter-nav-container">
            <div class="filter-nav" id="citySelector">
                </div>
        </div>

        <div id="dashboardContent" style="display: none; opacity: 0; transition: opacity 0.4s ease;">
            
            <h2 id="currentCityTitle" style="text-align: center; margin: 2rem 0; color: var(--redfin-red);">Loading Market...</h2>

            <div class="stats-container" style="border: none; padding-top: 0; flex-wrap: wrap;">
                <div class="stat-box">
                    <div class="stat-number" id="valNewListings">--</div>
                    <div class="stat-label">New Listings (7 Days)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="valPending">--</div>
                    <div class="stat-label">Pending (7 Days)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="valSold">--</div>
                    <div class="stat-label">Sold (7 Days)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-number" id="valAvgPrice">--</div>
                    <div class="stat-label">Avg New Price</div>
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr; gap: 3rem; margin-top: 2rem;">
                
                <div class="pro-card" style="padding: 1.5rem;">
                    <h3 style="text-align: center; margin-bottom: 1rem; font-size: 1.2rem;">Market Velocity (30 Days)</h3>
                    <canvas id="velocityChart"></canvas>
                </div>

                <div class="pro-card" style="padding: 1.5rem;">
                    <h3 style="text-align: center; margin-bottom: 1rem; font-size: 1.2rem;">Pricing Trends & Drops (30 Days)</h3>
                    <canvas id="pricingChart"></canvas>
                </div>

            </div>
        </div>
        
    </main>

    <universal-footer></universal-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const urlSnapshot = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Q94pArPoza2zWVI7dZagdcDBhIzdX9wtmrDbgJ_4h1rRr_WFuaMTjTfrJVVGQwbNGGLiSK2zCGnh/pub?gid=701119614&single=true&output=csv';
            const urlHistorical = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ4Q94pArPoza2zWVI7dZagdcDBhIzdX9wtmrDbgJ_4h1rRr_WFuaMTjTfrJVVGQwbNGGLiSK2zCGnh/pub?gid=1473136505&single=true&output=csv';

            let snapshotData = [];
            let historicalData = [];
            let velocityChartInstance = null;
            let pricingChartInstance = null;

            const cleanNum = (str) => {
                if (!str) return 0;
                return parseFloat(str.replace(/[^0-9.-]+/g, "")) || 0;
            };

            const formatCurrency = (num) => {
                return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num);
            };

            const fetchCSV = (url) => {
                return new Promise((resolve) => {
                    Papa.parse(url, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: function(results) { resolve(results.data); }
                    });
                });
            };

            Promise.all([fetchCSV(urlSnapshot), fetchCSV(urlHistorical)]).then(values => {
                snapshotData = values[0];
                historicalData = values[1];
                
                let cities = [...new Set(snapshotData.map(row => row.City ? row.City.trim() : ''))].filter(Boolean).sort();
                buildCitySelector(cities);
                
                if (cities.length > 0) {
                    updateDashboard(cities[0]);
                }
            });

            const buildCitySelector = (cities) => {
                const selector = document.getElementById('citySelector');
                let html = '';
                cities.forEach((city, index) => {
                    html += `<button class="filter-btn ${index === 0 ? 'active' : ''}" data-city="${city}">${city}</button>`;
                });
                selector.innerHTML = html;

                const btns = document.querySelectorAll('#citySelector .filter-btn');
                btns.forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        btns.forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        updateDashboard(e.target.getAttribute('data-city'));
                    });
                });
            };

            const updateDashboard = (city) => {
                document.getElementById('dashboardContent').style.display = 'block';
                setTimeout(() => document.getElementById('dashboardContent').style.opacity = '1', 50);
                
                document.getElementById('currentCityTitle').textContent = `${city} Market Snapshot`;

                const citySnap = snapshotData.find(row => row.City && row.City.trim() === city) || {};
                
                document.getElementById('valNewListings').textContent = cleanNum(citySnap['New Listings']);
                document.getElementById('valPending').textContent = cleanNum(citySnap['Pending']);
                document.getElementById('valSold').textContent = cleanNum(citySnap['Sold']);
                document.getElementById('valAvgPrice').textContent = formatCurrency(cleanNum(citySnap['Avg New Price']));

                const cityHistory = historicalData
                    .filter(row => row.City && row.City.trim() === city && row.Timestamp)
                    .sort((a, b) => new Date(a.Timestamp) - new Date(b.Timestamp));

                const labels = cityHistory.map(row => {
                    const d = new Date(row.Timestamp);
                    if (isNaN(d.getTime())) return ''; 
                    return `${d.getMonth()+1}/${d.getDate()}`;
                }).filter(l => l !== '');
                
                const histNew = cityHistory.map(row => cleanNum(row['New Listings']));
                const histPending = cityHistory.map(row => cleanNum(row['Pending']));
                const histSold = cityHistory.map(row => cleanNum(row['Sold']));
                const histAvgPrice = cityHistory.map(row => cleanNum(row['Avg New Price']));
                const histPriceDrops = cityHistory.map(row => cleanNum(row['Price Drops']));

                if (velocityChartInstance) velocityChartInstance.destroy();
                const ctxVel = document.getElementById('velocityChart').getContext('2d');
                velocityChartInstance = new Chart(ctxVel, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { label: 'New Listings', data: histNew, borderColor: '#3D3935', backgroundColor: '#3D3935', tension: 0.3 },
                            { label: 'Pending', data: histPending, borderColor: '#d32f2f', backgroundColor: '#d32f2f', tension: 0.3 },
                            { label: 'Sold', data: histSold, backgroundColor: '#e0e0e0', borderColor: '#e0e0e0', borderDash: [5, 5], tension: 0.3 }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } },
                        scales: { y: { beginAtZero: true } }
                    }
                });

                if (pricingChartInstance) pricingChartInstance.destroy();
                const ctxPrice = document.getElementById('pricingChart').getContext('2d');
                pricingChartInstance = new Chart(ctxPrice, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [
                            { 
                                type: 'line', 
                                label: 'Avg New Price ($)', 
                                data: histAvgPrice, 
                                borderColor: '#3D3935', /* Swapped from Gold to Charcoal */
                                backgroundColor: '#3D3935', 
                                yAxisID: 'y'
                            },
                            { 
                                type: 'bar', 
                                label: '# of Price Drops', 
                                data: histPriceDrops, 
                                backgroundColor: '#d32f2f', 
                                yAxisID: 'y1'
                            }
                        ]
                    },
                    options: {
                        responsive: true,
                        plugins: { legend: { position: 'bottom' } },
                        scales: {
                            y: { 
                                type: 'linear', 
                                display: true, 
                                position: 'left',
                                title: { display: true, text: 'Price ($)'}
                            },
                            y1: { 
                                type: 'linear', 
                                display: true, 
                                position: 'right', 
                                beginAtZero: true,
                                grid: { drawOnChartArea: false },
                                title: { display: true, text: 'Number of Drops'}
                            }
                        }
                    }
                });
            };
        });
    </script>
</body>
</html>
