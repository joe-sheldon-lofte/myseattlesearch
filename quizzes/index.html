<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assessments Catalog | Joe Sheldon</title>
    <link rel="stylesheet" href="/style.css?v=42">
    <script src="/components.js"></script>
</head>
<body>
<universal-header></universal-header>
<main style="max-width:900px; margin:4rem auto; padding:0 1.5rem; min-height:60vh;">
    <div style="text-align:center; margin-bottom:3rem;">
        <h1 style="font-size:2.5rem; font-weight:800; margin:0;">Strategy Evaluation Hub</h1>
        <p style="color:#555; font-size:1.1rem; margin-top:0.5rem;">Select an evaluation track to compile your custom behavioral report.</p>
    </div>
    <div id="catalog-mount" style="display:grid; grid-template-columns:repeat(auto-fit, minmax(320px, 1fr)); gap:2rem;"></div>
</main>
<universal-footer></universal-footer>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const mount = document.getElementById('catalog-mount');
        try {
            const res = await fetch('/data/quizzes.json');
            const db = await res.json();
            const today = new Date().setHours(0,0,0,0);
            
            const quizArray = Object.values(db);
            quizArray.sort((a, b) => (b.rank || 0) - (a.rank || 0));

            let html = '';
            let validCount = 0;

            for (const quiz of quizArray) {
                if (quiz.showInCatalog !== "Yes") continue; 
                if (quiz.startDate && today < new Date(quiz.startDate + "T00:00:00")) continue;
                if (quiz.endDate && today > new Date(quiz.endDate + "T00:00:00")) continue;

                validCount++;
                
                // 🌟 Conditional Card Image Header Template
                const cardImageHtml = quiz.quizImage 
                    ? `<img src="${quiz.quizImage}" alt="${quiz.webTitle}" style="width:100%; height:180px; object-fit:cover; border-radius:8px; margin-bottom:1.25rem; display:block;">` 
                    : '';

                html += `
                    <div style="background:#fff; border:1px solid #eee; border-top:5px solid var(--redfin-red); border-radius:12px; padding:2rem; display:flex; flex-direction:column; justify-content:space-between;">
                        <div>
                            ${cardImageHtml}
                            <h3 style="margin:0 0 0.5rem 0; font-size:1.35rem; font-weight:700;">${quiz.webTitle}</h3>
                            <p style="color:#555; font-size:0.95rem; line-height:1.5; margin-bottom:1.5rem;">${quiz.introText}</p>
                        </div>
                        <a href="/quizzes/viewport.html?id=${quiz.id}" class="btn btn-primary" style="text-align:center; font-weight:bold; text-decoration:none;">Take the Test</a>
                    </div>`;
            }
            mount.innerHTML = html || `<p style="text-align:center; width:100%; color:#777;">No public campaigns active right now.</p>`;
        } catch (e) { mount.innerHTML = '<p>Error loading catalog.</p>'; }
    });
</script>
</body>
</html>
