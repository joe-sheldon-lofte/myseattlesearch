# File: .github/workflows/deploy-site.yml
name: Deploy Eleventy Hub

on:
  push:
    branches: ["main", "master"] # Listens to both names to prevent configuration blindspots

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Project Dependencies
        run: npm install

      - name: Build Static Site Generator
        run: npx @11ty/eleventy

      - name: Configure GitHub Pages Routing
        uses: actions/configure-pages@v4

      - name: Upload Compiled Distribution
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Execute Live Deployment
        id: deployment
        uses: actions/deploy-pages@v4