# File: .github/workflows/hourly_build.yml
name: Hourly Fast Data & Site Build

on:
  schedule:
    # Runs at the top of every hour (Minute 0)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Script Dependencies
      run: |
        pip install pandas requests

    - name: Harvest Hourly Dashboard Data
      run: python scripts/harvest_hourly.py

    - name: Commit and Push Updated Hourly Data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff-index --quiet HEAD || git commit -m "Automated hourly data fetch"
        
        git pull --rebase origin main
        
        git push