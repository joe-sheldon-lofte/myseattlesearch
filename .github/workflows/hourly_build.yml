# File: .github/workflows/hourly_build.yml
name: Hourly Fast Data & Site Build

on:
  schedule:
    # Runs at the top of every hour (Minute 0)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Script Dependencies
      run: |
        pip install pandas requests feedparser python-dateutil boto3 pillow google-auth google-api-python-client

    - name: Extract Cloud Agent Credentials File
      env:
        GA_CREDENTIALS: ${{ secrets.GA_GOOGLE_CREDENTIALS }}
      run: echo "$GA_CREDENTIALS" > credentials.json

    - name: Harvest Automated Cloud CMS Pipeline
      run: python scripts/harvest_cms.py
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        CMS_SHEET_ID: ${{ secrets.CMS_SHEET_ID }}

    - name: Harvest Hourly Dashboard Data
      run: python scripts/harvest_hourly.py

    - name: Harvest Hyper-Local Market News Feeds
      run: python scripts/harvest_news.py

    - name: Clean Temporary Execution Keys
      run: rm -f credentials.json

    - name: Commit and Push Updated Data & CMS Posts
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/ src/posts/
        git diff-index --quiet HEAD || git commit -m "Automated hourly data and CMS synchronization"
        
        git pull --rebase origin main
        
        git push