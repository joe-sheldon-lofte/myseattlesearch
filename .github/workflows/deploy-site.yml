# File: .github/workflows/deploy-site.yml
name: Deploy Eleventy Hub

on:
  # 1. Direct Code Syncs: Triggers when you push template or style updates locally
  push:
    branches: ["main", "master"]

  # 2. Manual Override: Activates the missing "Run workflow" dashboard button 
  workflow_dispatch:

  # 3. The Chain Reaction: Listens for your data harvester script to finish
  workflow_run:
    workflows: ["Hourly Fast Data & Site Build"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    # CRITICAL SECURITY GATE: Run if it's a manual click, a code change, OR a successful automated harvest run
    if: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success') }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Node Engine
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Project Dependencies
        run: npm install

      - name: Build Static Site Generator
        run: npx @11ty/eleventy

      - name: Configure GitHub Pages Routing
        uses: actions/configure-pages@v4

      - name: Upload Compiled Distribution
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Execute Live Deployment
        id: deployment
        uses: actions/deploy-pages@v4