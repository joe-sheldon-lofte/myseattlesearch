# File: .github/workflows/quizzes_pipeline.yml
name: Quiz Engine Sync Pipeline

on:
  schedule:
    - cron: '0 0 * * 0' # Executes automatically every Sunday at midnight
  workflow_dispatch: # Allows you to force trigger the compilation instantly in GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Vault Source Repository
        uses: actions/checkout@v4

      - name: Configure Python Infrastructure environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Network Pipeline Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests boto3 pillow

      - name: Execute Serialization Data Harvest Script
        run: python scripts/harvest_quizzes.py
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          SHEETS_API_URL_QUIZZES: ${{ secrets.SHEETS_API_URL_QUIZZES }}

      - name: Commit and Push Compiled JSON Data Assets back to Repo
        run: |
          git config --global user.name "GitHub Actions Automation Pipeline"
          git config --global user.email "actions@github.com"
          git add data/quizzes.json
          git diff-index --quiet HEAD || git commit -m "Automated Pipeline Update: Synchronized quizzes.json assets"
          git push