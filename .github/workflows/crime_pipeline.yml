name: Dynamic Crime Data Pipeline

on:
  schedule:
    - cron: '0 5 * * 0' # Runs every Sunday night
  workflow_dispatch:

jobs:
  harvest-fbi-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas requests

      - name: Run Crime Harvester Engine
        env:
          # Securely injects your repository secret straight into the script execution environment
          FBI_API_KEY: ${{ secrets.FBI_API_KEY }}
        run: python scripts/harvest_crime.py

      - name: Commit and Push Payload Updates
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Runner"
          git add data/crime_stats.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Dynamic live FBI crime data metrics" && git pull --rebase origin main && git push)
