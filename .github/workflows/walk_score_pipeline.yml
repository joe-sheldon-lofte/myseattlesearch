name: Weekly Walk Score Harvest

on:
  schedule:
    # Runs automatically every Sunday night at 1 AM UTC
    - cron: '0 1 * * 0'
  workflow_dispatch:
    # Allows you to push the button manually to test right away!

jobs:
  harvest_walk_scores:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Run Walk Score Harvest Script
      env:
        WALK_SCORE_API_KEY: ${{ secrets.WALK_SCORE_API_KEY }}
      run: python scripts/harvest_walk_scores.py

    - name: Commit and Push Changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
        # Stage any JSON files updated or created inside the data directory
        git add data/*.json
        
        if git diff --staged --quiet; then
          echo "No lifestyle score adjustments discovered."
        else
          git commit -m "Automation: Updated multi-score lifestyle directory"
          git push
        fi
