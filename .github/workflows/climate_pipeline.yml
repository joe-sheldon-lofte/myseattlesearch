name: Climate Comfort Pipeline

on:
  schedule:
    # Runs at 06:30 UTC every Sunday night (right after emergency services)
    - cron: '30 6 * * 0'
  workflow_dispatch:

jobs:
  build-climate-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas

      - name: Run Climate Index Engine
        run: python scripts/harvest_climate.py

      - name: Commit and Push Updated Payloads
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Runner"
          git add data/climate_comfort.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Hyper-local microclimate comfort indicators" && git push)
