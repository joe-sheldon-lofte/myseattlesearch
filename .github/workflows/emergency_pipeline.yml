name: Public Safety Emergency Pipeline

on:
  schedule:
    # Runs at 06:00 UTC every Sunday night
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  calculate-emergency-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: pip install pandas

      - name: Run Emergency Infrastructure Proximity Harvester
        run: python scripts/harvest_emergency.py

      - name: Commit and Push Updated Payloads
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "GitHub Actions Runner"
          git add data/public_safety_emergency.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated update: Localized emergency room proximity maps and WSRB fire classes" && git push)
