# File: .github/workflows/update_data.yml
name: Daily Master Data Update

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:00 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Script Dependencies
      run: |
        pip install pandas requests

    - name: Harvest City Data Schema
      run: python scripts/harvest_city_data.py
      
    - name: Harvest InfoSparks Market Data
      run: python scripts/harvest_infosparks.py
      
    - name: Harvest Redfin Market Data
      run: python scripts/harvest_redfin.py

    - name: Commit and Push Updated Data Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff-index --quiet HEAD || git commit -m "Automated daily update of macro market statistics"
        
        git pull --rebase origin main
        
        git push