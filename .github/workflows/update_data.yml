# File: .github/workflows/update_data.yml
name: Daily Master Data Update

on:
  schedule:
    # Runs every day at 6:00 AM UTC (11:00 PM PST)
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repo Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Script Dependencies
      run: |
        pip install pandas requests openpyxl boto3 pillow

    - name: Harvest City Data Schema
      run: python scripts/harvest_city_data.py
      
    - name: Harvest InfoSparks Market Data
      run: python scripts/harvest_infosparks.py
      
    - name: Harvest Redfin Market Data
      run: python scripts/harvest_redfin.py
      
    - name: Harvest Website Master Ledger Sheet
      run: python scripts/harvest_website_data_sheet.py
      env:
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        SHEETS_API_URL_WEBSITE_DATA: ${{ secrets.SHEETS_API_URL_WEBSITE_DATA }}
        GOOGLE_SHEET_LIVE_URL: ${{ secrets.GOOGLE_SHEET_LIVE_URL }}

    - name: Commit and Push Updated Data Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/
        git diff-index --quiet HEAD || git commit -m "Automated daily update of macro market statistics"
        
        git pull --rebase origin main
        
        git push