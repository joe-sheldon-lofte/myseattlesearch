<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preferred Professionals | Joe Sheldon</title>
    <link rel="stylesheet" href="style.css?v=39">
    <script src="components.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>
<body class="pro-page">

    <universal-header></universal-header>

    <main class="container">
        
        <div class="events-header">
            <h1 style="margin-top: 1rem;">My Preferred Professionals</h1>
            <p class="intro">A curated list of trusted local experts I rely on to get the job done right.</p>
        </div>

        <div class="filter-nav-container">
            <div class="filter-nav" id="filterNav">
                </div>
        </div>

        <div class="pro-grid" id="proGrid">
            </div>
        
    </main>

    <universal-footer></universal-footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Helper to make clean slugs for our categories
            const slugify = (text) => text.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)+/g, '');

            // Fetch and parse the CSV from Google Sheets directly
            const sheetUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSntu7panLCFdXqZNXaJTHezzjKzajniQDJGopLfGJnIKgGEd773sQ0zfm0q8qEnnBzZDBzEjUd0ZAN/pub?gid=0&single=true&output=csv";
            
            Papa.parse(sheetUrl, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    const data = results.data;
                    const filterNav = document.getElementById('filterNav');
                    const proGrid = document.getElementById('proGrid');

                    let categories = new Set();
                    let cardsHTML = '';

                    // Loop through every row in the spreadsheet
                    data.forEach(row => {
                        const category = row['Category'] ? row['Category'].trim() : '';
                        if (!category) return; // Skip empty rows
                        
                        categories.add(category);
                        const catSlug = slugify(category);

                        const rawName = row['Business/Vendor Name'] ? row['Business/Vendor Name'].trim() : '';
                        let name = rawName;
                        let company = '';
                        
                        // Look for "Name (Company)" format
                        const match = rawName.match(/^(.*?)\s*\((.*?)\)$/);
                        if (match) {
                            name = match[1].trim();
                            company = match[2].trim();
                        }

                        // Handle trailing spaces in CSV headers just in case
                        let phone = row['Phone Number'] || row['Phone Number '] || '';
                        phone = phone.trim();
                        const phoneClean = phone.replace(/[^\d]/g, '');

                        const email = row['Email'] ? row['Email'].trim() : '';
                        
                        let website = row['Website'] ? row['Website'].trim() : '';
                        if (website && !website.startsWith('http')) {
                            website = 'https://' + website;
                        }

                        const additionalInfo = row['Additional Info'] ? row['Additional Info'].trim() : '';

                        // Build the card HTML
                        let card = `<div class="pro-card" data-category="${catSlug}">
                            <div class="pro-header">
                                <div class="pro-category-tag">${category}</div>
                            </div>
                            <h3 class="pro-name">${name}</h3>`;
                        
                        if (company) {
                            card += `<p class="pro-company">${company}</p>`;
                        }
                        if (additionalInfo) {
                            card += `<p class="pro-area">${additionalInfo}</p>`;
                        }
                        
                        card += `<div class="pro-contact">`;
                        if (phone) {
                            card += `<a href="tel:${phoneClean}" class="pro-link phone">${phone}</a>`;
                        }
                        if (email) {
                            card += `<a href="mailto:${email}" class="pro-link email">${email}</a>`;
                        }
                        if (website) {
                            card += `<a href="${website}" target="_blank" class="pro-link website">Visit Website</a>`;
                        }
                        card += `</div></div>`;

                        cardsHTML += card;
                    });

                    // Build the filter buttons alphabetically
                    const sortedCategories = Array.from(categories).sort();
                    let filtersHTML = '<button class="filter-btn active" data-filter="all">All</button>';
                    sortedCategories.forEach(cat => {
                        filtersHTML += `<button class="filter-btn" data-filter="${slugify(cat)}">${cat}</button>`;
                    });

                    // Inject the generated HTML into the page
                    filterNav.innerHTML = filtersHTML;
                    proGrid.innerHTML = cardsHTML;

                    // Setup filter button click events
                    const filterBtns = document.querySelectorAll('.filter-btn');
                    const proCards = document.querySelectorAll('.pro-card');

                    const applyFilter = (btn) => {
                        filterBtns.forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        const filterValue = btn.getAttribute('data-filter');
                        proCards.forEach(c => {
                            if (filterValue === 'all') {
                                c.style.display = 'flex';
                            } else {
                                c.style.display = c.getAttribute('data-category') === filterValue ? 'flex' : 'none';
                            }
                        });
                    };

                    filterBtns.forEach(btn => {
                        btn.addEventListener('click', () => applyFilter(btn));
                    });

                    // Check URL to see if a specific category was linked to directly
                    const urlParams = new URLSearchParams(window.location.search);
                    const categoryParam = urlParams.get('category');
                    if (categoryParam) {
                        const targetBtn = document.querySelector(`.filter-btn[data-filter="${categoryParam}"]`);
                        if (targetBtn) applyFilter(targetBtn);
                    }
                }
            });
        });
    </script>
</body>
</html>
